<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awesome Claude Skills</title>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;padding:40px;text-align:center}
h1{font-size:32px;margin-bottom:8px}
.subtitle{color:var(--text2);font-size:16px;margin-bottom:40px}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:260px;text-decoration:none;color:var(--text);transition:all .2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card h2{font-size:18px;margin-bottom:8px;color:var(--accent)}
.card p{font-size:13px;color:var(--text2);line-height:1.5}
.footer{margin-top:40px;font-size:12px;color:var(--text2)}
.footer a{color:var(--accent)}
</style>
</head>
<body>
<div class="container">
<h1>Awesome Claude Skills</h1>
<p class="subtitle">A curated collection of skills for Claude Code</p>

<div class="cards">
<a href="skills-catalog.html" class="card">
<h2>Skills Catalog</h2>
<p>Interactive browser with search, filters, and comparison. Fetches skills live from GitHub.</p>
</a>

<a href="skills-analysis.html" class="card">
<h2>Deep Analysis</h2>
<p>Comprehensive metrics: quality scores, risk assessment, GitHub stats, and insights.</p>
</a>
</div>

<div class="footer">
<a href="https://github.com/BehiSecc/awesome-claude-skills">View on GitHub</a>
</div>
</div>
</body>
</html>
